name: 丰田新闻自动抓取

on:
  schedule:
    # 每天北京时间 8:30 (UTC 00:30) 运行
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装依赖
        run: |
          npm install -g tsx
          npm install -g pnpm
          pnpm install
          pnpm add coze-coding-dev-sdk

      - name: 抓取新闻
        run: tsx news-fetcher.ts
        env:
          COZE_API_KEY: ${{ secrets.COZE_API_KEY }}

      - name: 提交文档
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "🤖 自动更新：丰田新闻简报 $(date +'%Y-%m-%d')"
          git push

      - name: 上传文档
        uses: actions/upload-artifact@v4
        with:
          name: news-report
          path: "*.md"